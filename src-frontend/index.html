<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fortuna</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0E1117;
            color: #FAFAFA;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        .logo {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            color: #D4AF37;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 300;
            color: #D4AF37;
            margin-bottom: 2rem;
            letter-spacing: 0.1em;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #1A1D24;
            border-top-color: #D4AF37;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1.5rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .status {
            font-size: 0.85rem;
            color: #888888;
        }
        .error {
            color: #ff6b6b;
            display: none;
            margin-top: 1rem;
            text-align: center;
            max-width: 400px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="logo">&#9884;</div>
    <h1>Fortuna</h1>
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">Starting...</div>
    <div class="error" id="error">
        Fortuna is taking longer than expected to start.<br />
        Please wait or restart the application.
    </div>

    <script>
        // Animated status text while Rust navigates the webview to Streamlit.
        // The Rust backend handles health checking and navigation — this is
        // purely cosmetic feedback for the user during the ~5-10s boot time.
        const messages = ['Starting...', 'Loading portfolio data...', 'Almost ready...'];
        let step = 0;
        const statusEl = document.getElementById('status');

        const timer = setInterval(() => {
            step++;
            if (step < messages.length) {
                statusEl.textContent = messages[step];
            } else if (step > 50) {
                // ~25s with no navigation — show warning
                clearInterval(timer);
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                statusEl.textContent = '';
            }
        }, 500);
    </script>
</body>
</html>
