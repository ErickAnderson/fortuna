<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fortuna</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0E1117;
            color: #FAFAFA;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        .logo {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            color: #D4AF37;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 300;
            color: #D4AF37;
            margin-bottom: 2rem;
            letter-spacing: 0.1em;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #1A1D24;
            border-top-color: #D4AF37;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1.5rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .status {
            font-size: 0.85rem;
            color: #888888;
        }
        .error {
            color: #ff6b6b;
            display: none;
            margin-top: 1rem;
            text-align: center;
            max-width: 400px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="logo">&#9884;</div>
    <h1>Fortuna</h1>
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">Starting...</div>
    <div class="error" id="error">
        Fortuna is taking longer than expected to start.<br />
        Please wait or restart the application.
    </div>

    <script>
        // Backup health polling from the frontend side.
        // Tauri's Rust code handles the primary navigation, but this
        // provides a fallback in case the Rust navigation fails.
        const MAX_ATTEMPTS = 60;
        const POLL_INTERVAL = 500;
        let attempts = 0;

        function pollHealth() {
            // Try common port range — Tauri will set the actual port via navigation,
            // but if we detect it from the webview URL we can poll directly
            const currentUrl = window.location.href;
            if (currentUrl.startsWith('http://127.0.0.1:')) {
                // We've already been navigated to Streamlit
                return;
            }

            attempts++;
            const statusEl = document.getElementById('status');

            if (attempts > MAX_ATTEMPTS) {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                statusEl.textContent = 'Timeout';
                return;
            }

            if (attempts > 6) {
                statusEl.textContent = 'Loading portfolio data...';
            } else {
                statusEl.textContent = 'Starting...';
            }

            setTimeout(pollHealth, POLL_INTERVAL);
        }

        pollHealth();
    </script>
</body>
</html>
